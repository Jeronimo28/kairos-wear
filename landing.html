<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos · El momento oportuno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .logo p {
            color: #b87c4f;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .tagline {
            margin-bottom: 3rem;
        }

        .tagline h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        .tagline .greek {
            font-size: 1.2rem;
            color: #b87c4f;
            font-style: italic;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #b87c4f;
            color: #0a0a0a;
        }

        .btn-primary:hover {
            background-color: #9a623d;
        }

        .btn-secondary {
            border: 1px solid #b87c4f;
            color: #b87c4f;
        }

        .btn-secondary:hover {
            background-color: #b87c4f;
            color: #0a0a0a;
        }

        .info {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
                gap: 0.8rem;
            }
            
            .logo h1 {
                font-size: 2rem;
            }
            
            .tagline h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">
            <h1>KAIROS</h1>
            <p>WEAR</p>
        </div>
        
        <div class="tagline">
            <h2>El momento oportuno</h2>
            <p class="greek">καιρός</p>
            <p style="margin-top: 1rem; color: #b0b0b0;">Siempre es el momento oportuno.<br>Empieza por cómo te vistes.</p>
        </div>
        
        <div class="buttons">
            <a href="login.html" class="btn btn-primary">INICIAR SESIÓN</a>
            <a href="register.html" class="btn btn-secondary">CREAR CUENTA</a>
        </div>
        
        <div class="info">
            Ropa para el instante que lo cambia todo
        </div>
    </div>

    <script>
        // Si ya hay sesión, redirigir directamente a la tienda (index.html)
        const user = JSON.parse(localStorage.getItem('kairosUser'));
        if (user && user.loggedIn) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
